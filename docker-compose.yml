services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fuelroutes
      POSTGRES_USER: fuelroutes
      POSTGRES_PASSWORD: fuelroutes
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fuelroutes"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgres://fuelroutes:fuelroutes@db:5432/fuelroutes
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8000}
      OSRM_BASE_URL: ${OSRM_BASE_URL:-https://router.project-osrm.org}
      MAX_SNAP_MILES: ${MAX_SNAP_MILES:-30}
      CORRIDOR_BUFFER_MILES: ${CORRIDOR_BUFFER_MILES:-15}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/health/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  pgdata:
